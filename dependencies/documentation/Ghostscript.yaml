name: ghostscript
config-opts:
  - --disable-cups
build-options:
  ldflags: -L/app/lib
  arch:
    aarch64:
      cppflags: -DPNG_ARM_NEON_OPT=0
sources:
  - type: archive
    url: https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10071/ghostscript-10.07.1.tar.xz
    sha256: 1cdb766de8db8f1e589c817f09c5855ea5f65dfc8540e465a69ac14c18416025
    x-checker-data:
      type: json
      url: https://api.github.com/repos/ArtifexSoftware/ghostpdl-downloads/releases/latest
      version-query: .name | split(" ") | .[1]
      url-query: .assets[] | select(.name|test("^ghostscript-(.*).tar.xz$")) |
        .browser_download_url