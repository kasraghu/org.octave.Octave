name: zeromq # dependency of the zeromq package
buildsystem: cmake-ninja
builddir: true
config-opts:
  - -DCMAKE_BUILD_TYPE=RelWithDebInfo
  - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
  - -DWITH_DOC=OFF
  - -Wno-dev # disable warnings for project developers
sources:
  - type: git
    url: https://github.com/zeromq/libzmq
    commit: 622fc6dde99ee172ebaa9c8628d85a7a1995a21d
    tag: v4.3.5
    x-checker-data:
      type: git
      tag-pattern: ^v([\d.]+)$
    
modules:
  - name: libsodium # dependency of the zeromq module
    sources:
      - type: git
        url: https://github.com/jedisct1/libsodium
        commit: 77e1ce5d6dee871c49ef211222ba18ef0c486bda
        tag: 1.0.22-RELEASE
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)-RELEASE$