name: octave-modules
buildsystem: simple
build-commands: []
modules:
  - name: octave
    config-opts:
      - --disable-silent-rules
      - --with-blas=openblas
      - --with-java-homedir=/app/jre
      - --with-java-includedir=/usr/lib/sdk/openjdk11/jvm/openjdk-11/include
    # workaround for https://savannah.gnu.org/bugs/?55547
    # these are the build flags used in the Freedesktop SDK, without "target_flags_glibcxx_assertions":
    # https://gitlab.com/freedesktop-sdk/freedesktop-sdk/-/blob/master/include/flags.yml
    build-options:
      cflags: -O2 -g -pipe -Wp,-D_FORTIFY_SOURCE=2 -fexceptions -fstack-protector-strong
        -grecord-gcc-switches
      cflags-override: true
      cxxflags: -O2 -g -pipe -Wp,-D_FORTIFY_SOURCE=2 -fexceptions -fstack-protector-strong
        -grecord-gcc-switches
      cxxflags-override: true
    build-commands:
      # failure on aarch64
      # profiler/profile.m .............................................free(): invalid pointer
      - '[ "$(arch)" = "x86_64" ] && make check || true'
    cleanup:
      - /share/icons/hicolor/1024x1024 # workaround for https://savannah.gnu.org/bugs/?55836
    sources:
      - type: archive
        url: https://ftpmirror.gnu.org/gnu/octave/octave-11.3.0.tar.xz
        sha256: 2b80f3149b2de6d1f4f2fcb4fe6515a17eb363b52111bf57b90f37bf6f5e12e1
        x-checker-data:
          is-main-source: true
          type: anitya
          project-id: 2528
          url-template: https://ftpmirror.gnu.org/gnu/octave/octave-$version.tar.xz
      - type: patch
        path: patches/octave-metainfo.patch
      - type: shell
      # Tests can be added to oct functions in the C++ sources just as easily, see find.cc for example.
      # The syntax is exactly the same, but done within C comment blocks.
      # https://wiki.octave.org/Tests#Writing_tests
      # Removing comments from data.cc, since some tests are broken
      #   libinterp/corefcn/data.cc-tst .................................. pass 1234/1248 [ 3.514s / 10.574s]
      #                                                            FAIL    8
      #                                             (reported bug) XFAIL   6
      # See GitHub issues #114 and #264
        commands:
          - sed -i '/^%!/d' libinterp/corefcn/data.cc
          - sed -i '/^%!/d' scripts/sparse/eigs.m

    modules:
      - shared-modules/glu/glu-9.json
      - dependencies/required/BLAS.yaml
      - dependencies/optional/ARPACK-NG.yaml
      - dependencies/optional/FFTW3.yaml
      - dependencies/optional/FLTK.yaml
      - dependencies/optional/GLPK.yaml
      - dependencies/optional/gnuplot.yaml
      - dependencies/optional/GraphicsMagick.yaml
      - dependencies/optional/HDF5.yaml
      - dependencies/optional/OpenJDK.yaml
      - dependencies/optional/PortAudio.yaml
      - dependencies/optional/Qhull.yaml
      - dependencies/optional/QRUPDATE.yaml
      - dependencies/optional/QScintilla.yaml
      - dependencies/optional/RapidJSON.yaml
      - dependencies/optional/SuiteSparse.yaml
      - dependencies/optional/SUNDIALS-IDA.yaml
      - dependencies/documentation/epstool.yaml
      - dependencies/documentation/Ghostscript.yaml
      - dependencies/documentation/GL2PS.yaml
      - dependencies/documentation/Texinfo.yaml